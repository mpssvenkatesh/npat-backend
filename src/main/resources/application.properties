# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=npat-multiplayer

# Logging Configuration
logging.level.root=INFO
logging.level.com.game.npat=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:8080

# WebSocket Configuration
websocket.endpoint=/game-websocket
websocket.broker=/topic
websocket.app-destination-prefix=/app

# Game Configuration
game.room.expiry.hours=2
game.timer.duration.seconds=60
game.min.players=2
game.max.players=8
